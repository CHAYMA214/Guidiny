version: '3.9'

services:
  backend:
    image: firstdock:3       # your backend image
    build: ./backend         # optional: rebuild from Dockerfile
    ports:
      - "3000:3000"          # expose backend port
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://admin:secret@mongodb:27017
    depends_on:
      - mongodb

  frontend:
    image: frontenddock:0    # your frontend image
    build: ./frontend
    ports:
      - "8080:80"            # expose frontend port
    depends_on:
      - backend

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chaymabaklouti59
      MONGO_INITDB_ROOT_PASSWORD: 
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: