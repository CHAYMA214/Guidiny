version: '3.9'

services:
  backend:
    image: firstdock:3
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGO_URL: mongodb://chaymabaklouti59:chayma@mongodb:27017/mern
    depends_on:
      - mongodb

  frontend:
    image: frontenddock:0
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: chaymabaklouti59
      MONGO_INITDB_ROOT_PASSWORD: chayma
      MONGO_INITDB_DATABASE: mern
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
  