services:
  backend:
    image: firstdock:3
    build: ./backend
    restart: always
    ports:
      - "5000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb

  frontend:
    image: frontenddock:0
    build: ./frontend
    restart: always
    ports:
      - "5173:3000"
    depends_on:
      - backend

  mongodb:
    image: mongo:6
    restart: always
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
